name: clawos-traefik-demo

services:
  traefik:
    image: traefik:v3.4
    container_name: clawos-traefik
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yaml
    ports:
      - "80:80"
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8082:8082"
    volumes:
      - ./traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./logs:/var/log/traefik
    networks:
      - clawos_public

  tenant_alpha:
    image: traefik/whoami:v1.10.2
    container_name: clawos-tenant-alpha
    restart: unless-stopped
    networks:
      - clawos_public

  tenant_beta:
    image: traefik/whoami:v1.10.2
    container_name: clawos-tenant-beta
    restart: unless-stopped
    networks:
      - clawos_public

networks:
  clawos_public:
    name: clawos_public
